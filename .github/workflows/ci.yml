name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DOTNET_VERSION: "8.x"
  TEST_PROJECT: test/LlvmDemangle.Tests/LlvmDemangle.Tests.csproj

jobs:
  native:
    name: Build native libraries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build all targets
        working-directory: native
        run: zig build

      - uses: actions/upload-artifact@v7
        with:
          name: native-libs
          path: native/zig-out/

  test:
    name: Test (${{ matrix.name }})
    needs: native
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: win-x64, os: windows-latest }
          - { name: win-arm64, os: windows-11-arm }
          - { name: linux-x64, os: ubuntu-latest }
          - { name: linux-arm64, os: ubuntu-24.04-arm }
          - { name: osx-x64, os: macos-26-intel }
          - { name: osx-arm64, os: macos-latest }
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/download-artifact@v8
        with:
          name: native-libs
          path: native/zig-out/

      - run: dotnet test ${{ env.TEST_PROJECT }} -c Release

  test-win-x86:
    name: Test (win-x86)
    needs: native
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: native-libs
          path: native/zig-out/

      - name: Install x86 .NET SDK
        shell: pwsh
        run: |
          & ([scriptblock]::Create((iwr -useb https://dot.net/v1/dotnet-install.ps1))) `
            -Architecture x86 -Channel 8.0 -InstallDir C:\dotnet-x86

      - name: Test
        shell: pwsh
        run: C:\dotnet-x86\dotnet.exe test ${{ env.TEST_PROJECT }} -c Release

  test-linux-musl:
    name: Test (${{ matrix.name }})
    needs: native
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-musl-x64, runner: ubuntu-latest }
          - { name: linux-musl-arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: native-libs
          path: native/zig-out/

      - name: Test in Alpine container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" -w /work \
            mcr.microsoft.com/dotnet/sdk:8.0-alpine3.21 \
            dotnet test ${{ env.TEST_PROJECT }} -c Release

  # No native arm32/x86 Linux runners and QEMU can't reliably run .NET — verify only
  verify-linux-other:
    name: Verify (${{ matrix.name }})
    needs: native
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { name: linux-arm, rid: linux-arm }
          - { name: linux-musl-arm, rid: linux-musl-arm }
          - { name: linux-x86, rid: linux-x86 }
          - { name: linux-musl-x86, rid: linux-musl-x86 }
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: native-libs
          path: native/zig-out/

      - name: Verify 32-bit ELF shared library
        run: |
          file native/zig-out/${{ matrix.rid }}/libllvm-demangle.so
          readelf -h native/zig-out/${{ matrix.rid }}/libllvm-demangle.so | grep -qi "elf32"

  pack:
    name: Pack NuGet
    needs: [native, test, test-win-x86, test-linux-musl, verify-linux-other]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/download-artifact@v8
        with:
          name: native-libs
          path: native/zig-out/

      - name: Pack
        run: dotnet pack src/LlvmDemangle/LlvmDemangle.csproj -c Release -o artifacts

      - uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: artifacts/*.nupkg
